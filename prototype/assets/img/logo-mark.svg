<svg width="64" height="64" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="DataPeaks Solutions">
  <defs>
    <linearGradient id="dp-grad" x1="8" y1="56" x2="56" y2="8" gradientUnits="userSpaceOnUse">
      <stop stop-color="#3B82F6"/>
      <stop offset="0.55" stop-color="#5AD7FF"/>
      <stop offset="1" stop-color="#34D399"/>
    </linearGradient>
    <linearGradient id="dp-fill" x1="32" y1="18" x2="32" y2="48" gradientUnits="userSpaceOnUse">
      <stop stop-color="#5AD7FF" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#3B82F6" stop-opacity="0.05"/>
    </linearGradient>
    <radialGradient id="dp-gold" cx="0.5" cy="0.5" r="0.5">
      <stop stop-color="#FFE08A"/>
      <stop offset="1" stop-color="#F5B301"/>
    </radialGradient>
  </defs>

  <!-- badge -->
  <rect x="2" y="2" width="60" height="60" rx="18" fill="#0A1426"/>
  <rect x="2.75" y="2.75" width="58.5" height="58.5" rx="17.25" stroke="url(#dp-grad)" stroke-width="1.5" opacity="0.9"/>

  <!-- filled peaks -->
  <path d="M12 47 L24 29 L30 36 L41 17 L52 47 Z" fill="url(#dp-fill)"/>

  <!-- ridge line: ascending peaks / pinnacle -->
  <path d="M12 47 L24 29 L30 36 L41 17 L52 47" stroke="url(#dp-grad)" stroke-width="4" stroke-linejoin="round" stroke-linecap="round"/>

  <!-- baseline -->
  <path d="M12 49.5 H52" stroke="#1D3355" stroke-width="2.5" stroke-linecap="round"/>

  <!-- glowing summit -->
  <circle cx="41" cy="17" r="6" fill="url(#dp-gold)" opacity="0.25"/>
  <circle cx="41" cy="17" r="3.2" fill="url(#dp-gold)"/>
</svg>
